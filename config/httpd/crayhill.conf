# Crayhill site vhost — static React SPA + PHP JSON API on the same origin.
#
# Installed by scripts/setup-api-ec2.sh (one-time on the box). @CRAYHILL_REPO@
# is replaced with the git clone path (default /var/www/crayhill2026).
#
# Routing order matters:
#   1. /api/v1/<name>  ->  @CRAYHILL_REPO@/api/v1/<name>.php  (JSON, PHP-FPM)
#   2. everything else in the docroot  ->  static file, or index.html (SPA)

<VirtualHost *:80>
    DocumentRoot /var/www/crayhill

    # --- PHP API ---------------------------------------------------------
    Alias /api @CRAYHILL_REPO@/api

    <Directory "@CRAYHILL_REPO@/api">
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        RewriteEngine On
        # Public URL /api/v1/news -> api/v1/news.php; nested paths such as
        # /api/v1/admin/login -> api/v1/admin/login.php
        # Skip when the target .php file already exists — without this guard
        # v1/health.php is rewritten to v1/health.php.php and Apache loops (500).
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^v1/(.+?)/?$ v1/$1.php [L]

        <FilesMatch \.php$>
            SetHandler "proxy:unix:@PHP_FPM_SOCKET@|fcgi://localhost"
        </FilesMatch>
    </Directory>

    # --- SPA (React dist) ------------------------------------------------
    # Real files first; index.html only for client-side routes.
    # Missing /assets/* must 404 — FallbackResource would return HTML for
    # stale hashed chunks and break dynamic import() after a deploy.
    <Directory /var/www/crayhill>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/assets/
        RewriteRule ^ /index.html [L]
    </Directory>

    # index.html revalidates after each deploy; hashed assets are immutable.
    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Files>
    <Directory /var/www/crayhill/assets>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    ErrorLog  /var/log/httpd/crayhill_error.log
    CustomLog /var/log/httpd/crayhill_access.log combined
</VirtualHost>
