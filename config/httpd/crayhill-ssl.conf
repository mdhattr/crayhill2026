# Crayhill HTTPS vhost — same routing as crayhill.conf on port 80.
#
# Installed by scripts/setup-ssl-ec2.sh after Let's Encrypt issues a cert.
# @CERT_NAME@ is the certbot certificate name (default www.crayhill.com).
#
# Listen 443 is normally in Amazon Linux's ssl.conf; when that file is disabled
# (missing localhost.crt), this directive must live here instead.

Listen 443 https

<VirtualHost *:443>
    DocumentRoot /var/www/crayhill

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/@CERT_NAME@/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/@CERT_NAME@/privkey.pem

    # --- PHP API ---------------------------------------------------------
    Alias /api @CRAYHILL_REPO@/api

    <Directory "@CRAYHILL_REPO@/api">
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^v1/(.+?)/?$ v1/$1.php [L]

        <FilesMatch \.php$>
            SetHandler "proxy:unix:@PHP_FPM_SOCKET@|fcgi://localhost"
        </FilesMatch>
    </Directory>

    # --- SPA (React dist) ------------------------------------------------
    <Directory /var/www/crayhill>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/assets/
        RewriteRule ^ /index.html [L]
    </Directory>

    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Files>
    <Directory /var/www/crayhill/assets>
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    ErrorLog  /var/log/httpd/crayhill_ssl_error.log
    CustomLog /var/log/httpd/crayhill_ssl_access.log combined
</VirtualHost>
